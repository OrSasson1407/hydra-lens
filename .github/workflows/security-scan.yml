name: Security Scan

on:
  schedule:
    - cron: '0 0 * * 0'
  push:
    branches: [main]

permissions:
  contents: read
  security-events: write

jobs:
  audit_and_scan:
    name: Dependency audit + security scan
    runs-on: ubuntu-latest
    env:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        # --config.minimum-release-age=0 as belt-and-suspenders for this
        # workflow; the real fix is in pnpm-workspace.yaml (minimumReleaseAge: 0)
        run: pnpm install --frozen-lockfile --config.minimum-release-age=0

      - name: Dependency audit
        run: pnpm audit --audit-level=high --prod || true

      - name: Build CLI + core
        run: pnpm build

      - name: Start demo-app server
        run: npx serve demo-app -p 3000 &

      - name: Wait for server
        run: sleep 3

      - name: Run security-only CLI scan
        # Writes JSON to report.json (CLI does not produce SARIF)
        # --threshold security means exit 1 only on secret leaks
        run: |
          node packages/cli/dist/index.js \
            --security-only \
            --threshold security \
            --output report.json \
            http://localhost:3000 || true

      - name: Upload JSON scan report
        # Always upload so the artifact exists even on a clean scan
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-scan-report
          path: report.json
          retention-days: 30
          # Don't fail the workflow if the file doesn't exist
          # (clean scan with no output file is fine)
          if-no-files-found: warn

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps

      - name: Playwright XSS hardening tests
        run: pnpm run test:e2e:xss || true

      - name: Slack notification on failure
        if: failure() && env.SLACK_WEBHOOK_URL != ''
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {
              "text": ":rotating_light: HydraLens security scan failed on `main`.",
              "attachments": [{
                "color": "danger",
                "text": "Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
              }]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK


