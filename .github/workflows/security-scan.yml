name: Security Scan
on:
  schedule:
    - cron: "0 0 * * 0"
  push:
    branches: [main]

jobs:
  audit_and_scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v3
      - run: npm install -g pnpm && pnpm install --no-frozen-lockfile --config.minimum-release-age=0
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: PNPM Audit
        run: pnpm audit --audit-level=high --prod

      - name: HydraLens Security Scan
        run: npx hydra-lens --security-only http://localhost:3000

      - name: Playwright XSS Tests
        run: pnpm run test:e2e:xss

      - name: Upload SARIF Report
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: report.sarif

      - name: Slack Notification
        if: failure()
        uses: slackapi/slack-github-action@v1.23.0
        with:
          payload: |
            {
              "text": "Security scan failed on main branch!"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
