name: Security Scan
on:
  schedule:
    - cron: '0 0 * * 0'
  push:
    branches: [main]

jobs:
  audit_and_scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    # Define globally so EVERY pnpm command ignores the release age
    env:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
      npm_config_minimum_release_age: '0' 
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup & Install Dependencies
        run: |
          npm install -g pnpm
          pnpm install --no-frozen-lockfile
      
      - name: Build Local Monorepo
        run: pnpm run build
        
      - name: PNPM Audit
        run: pnpm audit --audit-level=high --prod || true
        
      - name: Start Target Server
        run: npx serve demo-app -p 3000 &
        
      - name: Wait for server
        run: sleep 3
        
      - name: HydraLens Security Scan
        # The scan will run, detect issues, save to report.sarif, and continue
        run: node packages/cli/dist/index.js --security-only --output report.sarif http://localhost:3000 || true
        
      - name: Install Playwright Browsers
        run: pnpm exec playwright install --with-deps
        
      - name: Playwright XSS Tests
        run: pnpm run test:e2e:xss || true
        
      - name: Upload SARIF Report
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: report.sarif
          
      - name: Slack Notification
        if: failure()
        uses: slackapi/slack-github-action@v1.23.0
        with:
          payload: |
            {
              "text": "Security scan failed on main branch!"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}