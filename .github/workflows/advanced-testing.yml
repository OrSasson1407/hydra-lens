name: Advanced reliability

on:
  schedule:
    - cron: '0 2 * * 1'
  workflow_dispatch:

jobs:
  fuzz:
    name: Fuzz + benchmarks
    runs-on: ubuntu-latest
    env:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm build:core

      - name: Fast-check fuzz suite
        run: pnpm test:fuzz

      - name: Vitest benchmarks
        run: pnpm test:bench

  mutation:
    name: Mutation testing (Stryker)
    runs-on: ubuntu-latest
    env:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm build:core

      - name: Stryker mutation run
        run: pnpm exec stryker run

      - name: Upload mutation report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: stryker-report
          path: reports/mutation/
          retention-days: 14
