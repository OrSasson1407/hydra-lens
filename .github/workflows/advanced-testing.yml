name: Advanced Reliability & Security

on:
  schedule:
    - cron: "0 2 * * 1" 
  workflow_dispatch: 

jobs:
  fuzz_and_bench:
    runs-on: ubuntu-latest
    env:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
    steps:
      - uses: actions/checkout@v3
      - run: npm install -g pnpm && pnpm install --no-frozen-lockfile --config.minimum-release-age=0

      - name: Run Fast-Check Fuzzing Suite
        run: pnpm run test:fuzz

      - name: Run Vitest Benchmarks
        run: pnpm run test:bench

  mutation_testing:
    runs-on: ubuntu-latest
    env:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
    steps:
      - uses: actions/checkout@v3
      - run: npm install -g pnpm && pnpm install --no-frozen-lockfile --config.minimum-release-age=0

      - name: Run Stryker Mutator
        run: pnpm exec stryker run

      - name: Upload Mutation Report
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: stryker-report
          path: reports/mutation/