name: Advanced Reliability & Security

on:
  schedule:
    - cron: '0 2 * * 1' # Runs every Monday at 2 AM
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  fuzz_and_bench:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - run: npm install -g pnpm && pnpm install
      
      - name: Run Fast-Check Fuzzing Suite
        run: pnpm run test:fuzz
        
      - name: Run Vitest Benchmarks
        run: pnpm run test:bench

  mutation_testing:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - run: npm install -g pnpm && pnpm install
      
      - name: Run Stryker Mutator
        run: pnpm exec stryker run
        
      - name: Upload Mutation Report
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: stryker-report
          path: reports/mutation/
