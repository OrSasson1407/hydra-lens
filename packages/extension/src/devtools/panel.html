<!DOCTYPE html>
<html>
<head>
  <style>
    * { box-sizing: border-box; }
    body { font-family: system-ui, -apple-system, sans-serif; background: #1a1a2e; color: #e5e7eb; margin: 0; padding: 0; }

    /* Toolbar */
    .toolbar { padding: 10px 16px; background: #1f2937; border-bottom: 1px solid #374151; display: flex; gap: 8px; align-items: center; position: sticky; top: 0; z-index: 10; }
    button { background: #3b82f6; color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-weight: 600; font-size: 12px; transition: background 0.15s; }
    button:hover { background: #2563eb; }
    button.secondary { background: #374151; }
    button.secondary:hover { background: #4b5563; }

    /* Filter bar */
    .filter-bar { padding: 8px 16px; background: #111827; border-bottom: 1px solid #374151; display: flex; gap: 6px; flex-wrap: wrap; }
    .filter-btn { background: #1f2937; color: #9ca3af; border: 1px solid #374151; padding: 4px 10px; border-radius: 999px; font-size: 11px; font-weight: 600; cursor: pointer; transition: all 0.15s; }
    .filter-btn:hover { background: #374151; color: #e5e7eb; }
    .filter-btn.active { color: #fff; border-color: transparent; }
    .filter-btn[data-filter="all"].active    { background: #6366f1; }
    .filter-btn[data-filter="security"].active { background: #ef4444; }
    .filter-btn[data-filter="critical"].active { background: #f97316; }
    .filter-btn[data-filter="warning"].active  { background: #eab308; color: #111; }
    .filter-btn[data-filter="info"].active     { background: #3b82f6; }

    /* Stats */
    .content { padding: 16px; }
    .stats { display: flex; gap: 12px; margin-bottom: 16px; }
    .stat-box { background: #111827; padding: 12px; border-radius: 6px; flex: 1; text-align: center; border: 1px solid #374151; }
    .stat-val { font-size: 22px; font-weight: bold; margin-top: 4px; }
    .delta-up   { color: #ef4444; font-size: 13px; font-weight: bold; }
    .delta-down { color: #10b981; font-size: 13px; font-weight: bold; }

    /* Issues */
    .issue { background: #111827; padding: 14px; margin-bottom: 12px; border-left: 4px solid; border-radius: 6px; }
    .issue.security { border-color: #ef4444; }
    .issue.critical { border-color: #f97316; }
    .issue.warning  { border-color: #eab308; }
    .issue.info     { border-color: #3b82f6; }

    .badge { padding: 2px 7px; border-radius: 4px; font-size: 10px; font-weight: 800; color: #fff; margin-left: 8px; vertical-align: middle; }
    .issue.security .badge { background: #ef4444; }
    .issue.critical .badge { background: #f97316; }
    .issue.warning  .badge { background: #eab308; color: #111; }
    .issue.info     .badge { background: #3b82f6; }

    .detail { font-size: 12px; color: #9ca3af; margin: 5px 0; background: rgba(255,255,255,0.03); padding: 5px 8px; border-radius: 4px; }
    .detail code { color: #a78bfa; font-size: 11px; }
    .advice-box { color: #d1fae5 !important; background: rgba(16,185,129,0.07) !important; border-left: 2px solid #10b981; }

    pre { background: #000; padding: 10px; overflow-x: auto; border-radius: 4px; color: #a78bfa; font-size: 11px; margin: 8px 0; white-space: pre-wrap; word-break: break-word; }

    .btn-copy   { background: #7c3aed; font-size: 11px; padding: 4px 10px; margin-top: 2px; }
    .btn-copy:hover { background: #6d28d9; }
    .btn-ignore { font-size: 11px; padding: 3px 8px; }
  </style>
</head>
<body>
  <div class="toolbar">
    <button id="btn-scan">Scan Page</button>
    <button id="btn-clear" class="secondary">Clear</button>
    <button id="btn-export-json" class="secondary" style="margin-left:auto;">Export JSON</button>
  </div>

  <div class="filter-bar" id="filter-bar">
    <button class="filter-btn active" data-filter="all">All</button>
    <button class="filter-btn" data-filter="security">Security</button>
    <button class="filter-btn" data-filter="critical">Critical</button>
    <button class="filter-btn" data-filter="warning">Warning</button>
    <button class="filter-btn" data-filter="info">Info</button>
  </div>

  <div class="content">
    <div class="stats" id="stats-container" style="display:none;">
      <div class="stat-box">Total<div class="stat-val" id="stat-total">0</div></div>
      <div class="stat-box">Critical / Security<div class="stat-val" id="stat-critical" style="color:#f97316;">0</div></div>
      <div class="stat-box">vs Last Scan<div class="stat-val" id="stat-delta">-</div></div>
    </div>
    <p id="empty-state" style="text-align:center; color:#6b7280; margin-top:40px;">Ready. Click Scan Page or navigate to trigger an auto-scan.</p>
    <div id="results"></div>
  </div>

  <script type="module" src="./panel.ts"></script>
</body>
</html>
