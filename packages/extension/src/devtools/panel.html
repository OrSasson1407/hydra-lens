<!DOCTYPE html>
<html>
<head>
  <style>
    * { box-sizing: border-box; }
    body { font-family: system-ui, -apple-system, sans-serif; background: #1a1a2e; color: #e5e7eb; margin: 0; padding: 0; }

    /* Toolbar */
    .toolbar { padding: 9px 14px; background: #1f2937; border-bottom: 1px solid #374151; display: flex; gap: 7px; align-items: center; position: sticky; top: 0; z-index: 20; }
    button { background: #3b82f6; color: #fff; border: none; padding: 5px 12px; border-radius: 4px; cursor: pointer; font-weight: 600; font-size: 12px; transition: opacity 0.15s; }
    button:hover { opacity: 0.85; }
    button.secondary { background: #374151; }

    /* Sort */
    select { background: #1f2937; color: #d1d5db; border: 1px solid #374151; border-radius: 4px; padding: 4px 8px; font-size: 12px; margin-left: auto; }

    /* Tabs */
    .tabs { display: flex; background: #111827; border-bottom: 1px solid #374151; }
    .tab-btn { flex: 1; padding: 7px; font-size: 12px; font-weight: 600; background: transparent; color: #6b7280; border: none; border-bottom: 2px solid transparent; cursor: pointer; }
    .tab-btn.tab-active { color: #e5e7eb; border-bottom-color: #3b82f6; }

    /* Filter bar */
    .filter-bar { padding: 7px 14px; background: #111827; border-bottom: 1px solid #374151; display: flex; gap: 5px; flex-wrap: wrap; }
    .filter-btn { background: #1f2937; color: #9ca3af; border: 1px solid #374151; padding: 3px 10px; border-radius: 999px; font-size: 11px; font-weight: 600; cursor: pointer; }
    .filter-btn.active { color: #fff; border-color: transparent; }
    .filter-btn[data-filter="all"].active     { background: #6366f1; }
    .filter-btn[data-filter="security"].active { background: #ef4444; }
    .filter-btn[data-filter="critical"].active { background: #f97316; }
    .filter-btn[data-filter="warning"].active  { background: #eab308; color: #111; }
    .filter-btn[data-filter="info"].active     { background: #3b82f6; }

    /* Error banner */
    .error-banner { display: none; background: #450a0a; color: #fca5a5; border: 1px solid #ef4444; padding: 8px 14px; font-size: 12px; }

    /* Stats */
    .content { padding: 14px; }
    .stats { display: flex; gap: 10px; margin-bottom: 14px; }
    .stat-box { background: #111827; padding: 10px; border-radius: 6px; flex: 1; text-align: center; border: 1px solid #374151; }
    .stat-label { font-size: 10px; color: #6b7280; text-transform: uppercase; letter-spacing: 0.05em; }
    .stat-val { font-size: 20px; font-weight: bold; margin-top: 3px; }
    .delta-up   { color: #ef4444; font-size: 13px; font-weight: bold; }
    .delta-down { color: #10b981; font-size: 13px; font-weight: bold; }

    /* Issue cards */
    .issue { background: #111827; margin-bottom: 10px; border-left: 4px solid; border-radius: 6px; overflow: hidden; }
    .issue.security { border-color: #ef4444; }
    .issue.critical { border-color: #f97316; }
    .issue.warning  { border-color: #eab308; }
    .issue.info     { border-color: #3b82f6; }

    .card-header { padding: 10px 12px; display: flex; align-items: center; justify-content: space-between; cursor: pointer; user-select: none; }
    .card-header:hover { background: rgba(255,255,255,0.03); }
    .card-title { font-size: 13px; font-weight: 600; }
    .card-actions { display: flex; align-items: center; gap: 5px; }
    .collapse-arrow { font-size: 12px; color: #6b7280; }

    .card-body { padding: 0 12px 12px; }
    .badge { padding: 2px 7px; border-radius: 4px; font-size: 10px; font-weight: 800; color: #fff; margin-left: 7px; vertical-align: middle; }
    .issue.security .badge { background: #ef4444; }
    .issue.critical .badge { background: #f97316; }
    .issue.warning  .badge { background: #eab308; color: #111; }
    .issue.info     .badge { background: #3b82f6; }

    .detail { font-size: 12px; color: #9ca3af; margin: 4px 0; background: rgba(255,255,255,0.03); padding: 4px 7px; border-radius: 3px; }
    .detail code { color: #a78bfa; font-size: 11px; }
    .advice-box { color: #d1fae5 !important; background: rgba(16,185,129,0.07) !important; border-left: 2px solid #10b981; }
    pre { background: #000; padding: 9px; overflow-x: auto; border-radius: 4px; color: #a78bfa; font-size: 11px; margin: 7px 0; white-space: pre-wrap; word-break: break-word; }

    .btn-sm { font-size: 11px; padding: 3px 8px; }
    .btn-copy  { background: #7c3aed; }
    .btn-jump  { background: #0891b2; }
    .btn-ignore { background: #374151; }

    /* Ignored pane */
    #pane-ignored { display: none; padding: 10px 0; }
    .ignored-row { display: flex; align-items: center; gap: 8px; padding: 6px 14px; border-bottom: 1px solid #1f2937; }
    .ignored-sel { font-size: 11px; color: #a78bfa; flex: 1; word-break: break-all; }
    .btn-unignore { background: #059669; font-size: 11px; padding: 3px 8px; }
  </style>
</head>
<body>
  <div class="toolbar">
    <button id="btn-scan">Scan Page</button>
    <button id="btn-clear" class="secondary">Clear</button>
    <button id="btn-export-json" class="secondary">Export JSON</button>
    <select id="sort-select">
      <option value="severity">Sort: Severity</option>
      <option value="selector">Sort: Selector</option>
      <option value="found">Sort: Found order</option>
    </select>
  </div>

  <div class="tabs">
    <button class="tab-btn tab-active" id="tab-results">Issues</button>
    <button class="tab-btn" id="tab-ignored">Ignored</button>
  </div>

  <div class="filter-bar" id="filter-bar">
    <button class="filter-btn active" data-filter="all">All</button>
    <button class="filter-btn" data-filter="security">Security</button>
    <button class="filter-btn" data-filter="critical">Critical</button>
    <button class="filter-btn" data-filter="warning">Warning</button>
    <button class="filter-btn" data-filter="info">Info</button>
  </div>

  <div class="error-banner" id="error-banner"></div>

  <div class="content">
    <div class="stats" id="stats-container" style="display:none;">
      <div class="stat-box"><div class="stat-label">Total</div><div class="stat-val" id="stat-total">0</div></div>
      <div class="stat-box"><div class="stat-label">Critical/Sec</div><div class="stat-val" id="stat-critical" style="color:#f97316;">0</div></div>
      <div class="stat-box"><div class="stat-label">vs Last Scan</div><div class="stat-val" id="stat-delta">-</div></div>
      <div class="stat-box"><div class="stat-label">Duration</div><div class="stat-val" id="stat-duration" style="font-size:14px;">-</div></div>
    </div>
    <p id="empty-state" style="text-align:center; color:#6b7280; margin-top:40px;">Ready. Click Scan Page or navigate to trigger a scan.</p>
    <div id="pane-results"><div id="results"></div></div>
    <div id="pane-ignored"></div>
  </div>

  <script type="module" src="./panel.ts"></script>
</body>
</html>
