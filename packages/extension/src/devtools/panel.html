<!DOCTYPE html>
<html>
<head>
  <style>
    body { font-family: system-ui, -apple-system, sans-serif; background: #242424; color: #e5e7eb; margin: 0; padding: 0; }
    .toolbar { padding: 12px 20px; background: #1f2937; border-bottom: 1px solid #374151; display: flex; gap: 12px; align-items: center; position: sticky; top: 0; z-index: 10; }
    button { background: #3b82f6; color: white; border: none; padding: 6px 14px; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 13px; }
    button:hover { background: #2563eb; }
    button.secondary { background: #4b5563; }
    button.secondary:hover { background: #374151; }
    .content { padding: 20px; }
    .stats { display: flex; gap: 15px; margin-bottom: 20px; }
    .stat-box { background: #111827; padding: 15px; border-radius: 6px; flex: 1; text-align: center; border: 1px solid #374151;}
    .stat-val { font-size: 24px; font-weight: bold; margin-top: 5px;}
    .delta-up { color: #ef4444; font-size: 12px; }
    .delta-down { color: #10b981; font-size: 12px; }
    .issue { background: #111827; padding: 14px; margin-bottom: 14px; border-left: 4px solid; border-radius: 6px; position: relative;}
    .issue.security { border-color: #ef4444; }
    .issue.critical { border-color: #f97316; }
    .issue.warning { border-color: #eab308; }
    .issue.info { border-color: #3b82f6; }
    .badge { padding: 3px 8px; border-radius: 4px; font-size: 10px; font-weight: 800; color: #fff; margin-left: 10px;}
    .security .badge { background: #ef4444; }
    .critical .badge { background: #f97316; }
    .warning .badge { background: #eab308; }
    .info .badge { background: #3b82f6; }
    .detail { font-size: 13px; color: #9ca3af; margin: 6px 0; background: rgba(255,255,255,0.03); padding: 6px 8px; border-radius: 4px; }
    pre { background: #000; padding: 10px; overflow-x: auto; border-radius: 4px; color: #a78bfa; font-size: 12px; margin: 10px 0; }
  </style>
</head>
<body>
  <div class="toolbar">
     <button id="btn-scan">?? Scan Page</button>
     <button id="btn-clear" class="secondary">?? Clear</button>
     <button id="btn-export-json" class="secondary" style="margin-left:auto;">?? Export JSON</button>
  </div>
  <div class="content">
      <div class="stats" id="stats-container" style="display:none;">
          <div class="stat-box">Total Mismatches<div class="stat-val" id="stat-total">0</div></div>
          <div class="stat-box">Critical Issues<div class="stat-val" id="stat-critical" style="color:#f97316;">0</div></div>
          <div class="stat-box">Scan History Delta<div class="stat-val" id="stat-delta">-</div></div>
      </div>
      <p id="empty-state" style="text-align:center; color:#9ca3af; margin-top:40px;">Ready. Navigation will trigger auto-scans.</p>
      <div id="results"></div>
  </div>
  <script type="module" src="./panel.ts"></script>
</body>
</html>
