<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HydraLens</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      :root {
        --bg:         #0d0f12;
        --surface:    #161a20;
        --border:     #252a33;
        --accent:     #ef4444;
        --accent-dim: rgba(239, 68, 68, 0.12);
        --green:      #34d399;
        --yellow:     #fbbf24;
        --muted:      #4b5563;
        --text:       #e5e7eb;
        --text-dim:   #6b7280;
        --radius:     8px;
        --mono:       'Space Mono', monospace;
        --sans:       'DM Sans', sans-serif;
      }

      body {
        width: 340px;
        background: var(--bg);
        color: var(--text);
        font-family: var(--sans);
        font-size: 13px;
        overflow: hidden;
      }

      /* ── Header ── */
      .header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 14px 16px 12px;
        border-bottom: 1px solid var(--border);
        background: var(--surface);
      }

      .logo {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .logo-icon {
        width: 28px;
        height: 28px;
        background: var(--accent);
        border-radius: 6px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 15px;
        flex-shrink: 0;
      }

      .logo-text {
        font-family: var(--mono);
        font-size: 14px;
        font-weight: 700;
        letter-spacing: -0.5px;
        color: var(--text);
      }

      .logo-text span { color: var(--accent); }

      .badge {
        font-family: var(--mono);
        font-size: 9px;
        font-weight: 700;
        letter-spacing: 1px;
        text-transform: uppercase;
        color: var(--muted);
        border: 1px solid var(--border);
        border-radius: 4px;
        padding: 2px 6px;
      }

      /* ── Controls ── */
      .controls {
        display: flex;
        gap: 8px;
        padding: 12px 16px;
        border-bottom: 1px solid var(--border);
      }

      .btn {
        flex: 1;
        padding: 8px 0;
        border: none;
        border-radius: var(--radius);
        font-family: var(--mono);
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.5px;
        cursor: pointer;
        transition: opacity 0.15s, transform 0.1s;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 5px;
      }

      .btn:active { transform: scale(0.97); }
      .btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

      .btn-run {
        background: var(--accent);
        color: #fff;
      }

      .btn-run:hover:not(:disabled) { opacity: 0.88; }

      .btn-clear {
        background: var(--surface);
        color: var(--text-dim);
        border: 1px solid var(--border);
      }

      .btn-clear:hover:not(:disabled) { color: var(--text); border-color: var(--muted); }

      /* ── Status Bar ── */
      .status-bar {
        padding: 8px 16px;
        display: flex;
        align-items: center;
        gap: 6px;
        font-size: 11px;
        color: var(--text-dim);
        min-height: 34px;
        border-bottom: 1px solid var(--border);
      }

      .status-dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: var(--muted);
        flex-shrink: 0;
      }

      .status-dot.scanning {
        background: var(--yellow);
        animation: pulse 1s infinite;
      }

      .status-dot.ok { background: var(--green); }
      .status-dot.error { background: var(--accent); }
      .status-dot.found { background: var(--yellow); }

      @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.3; }
      }

      /* ── Results ── */
      .results {
        max-height: 300px;
        overflow-y: auto;
        padding: 8px 0;
      }

      .results::-webkit-scrollbar { width: 4px; }
      .results::-webkit-scrollbar-track { background: transparent; }
      .results::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

      .empty-state {
        padding: 28px 16px;
        text-align: center;
        color: var(--text-dim);
      }

      .empty-icon { font-size: 28px; margin-bottom: 8px; }

      .empty-state p { font-size: 12px; line-height: 1.5; }

      .mismatch-item {
        padding: 10px 16px;
        border-bottom: 1px solid var(--border);
        cursor: pointer;
        transition: background 0.1s;
      }

      .mismatch-item:last-child { border-bottom: none; }
      .mismatch-item:hover { background: var(--surface); }

      .mismatch-header {
        display: flex;
        align-items: center;
        gap: 6px;
        margin-bottom: 6px;
      }

      .mismatch-index {
        font-family: var(--mono);
        font-size: 10px;
        color: var(--accent);
        background: var(--accent-dim);
        border-radius: 3px;
        padding: 1px 5px;
        flex-shrink: 0;
      }

      .mismatch-selector {
        font-family: var(--mono);
        font-size: 10px;
        color: var(--text-dim);
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        flex: 1;
      }

      .diff-row {
        display: flex;
        gap: 4px;
        align-items: flex-start;
        margin-top: 3px;
      }

      .diff-label {
        font-family: var(--mono);
        font-size: 9px;
        font-weight: 700;
        letter-spacing: 0.5px;
        padding: 1px 4px;
        border-radius: 3px;
        flex-shrink: 0;
        margin-top: 1px;
      }

      .diff-label.server {
        background: rgba(239, 68, 68, 0.2);
        color: #f87171;
      }

      .diff-label.client {
        background: rgba(52, 211, 153, 0.15);
        color: var(--green);
      }

      .diff-value {
        font-family: var(--mono);
        font-size: 11px;
        word-break: break-all;
        line-height: 1.4;
      }

      .diff-value.server { color: #f87171; text-decoration: line-through; }
      .diff-value.client { color: var(--green); }

      /* ── Footer ── */
      .footer {
        padding: 9px 16px;
        border-top: 1px solid var(--border);
        display: flex;
        justify-content: space-between;
        align-items: center;
        background: var(--surface);
      }

      .footer-url {
        font-family: var(--mono);
        font-size: 9px;
        color: var(--muted);
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        max-width: 220px;
      }

      .count-badge {
        font-family: var(--mono);
        font-size: 10px;
        padding: 2px 7px;
        border-radius: 10px;
        font-weight: 700;
        flex-shrink: 0;
      }

      .count-badge.none { background: var(--surface); color: var(--muted); border: 1px solid var(--border); }
      .count-badge.some { background: var(--accent-dim); color: var(--accent); border: 1px solid rgba(239,68,68,0.3); }
    </style>
  </head>
  <body>
    <div class="header">
      <div class="logo">
        <div class="logo-icon">💧</div>
        <div class="logo-text">Hydra<span>Lens</span></div>
      </div>
      <div class="badge">v0.1.0</div>
    </div>

    <div class="controls">
      <button class="btn btn-run" id="btn-run">▶ SCAN PAGE</button>
      <button class="btn btn-clear" id="btn-clear">✕ CLEAR</button>
    </div>

    <div class="status-bar">
      <div class="status-dot" id="status-dot"></div>
      <span id="status-text">Ready — click Scan to detect mismatches</span>
    </div>

    <div class="results" id="results">
      <div class="empty-state">
        <div class="empty-icon">🔬</div>
        <p>No scan run yet.<br/>Click <strong>Scan Page</strong> to detect<br/>hydration mismatches.</p>
      </div>
    </div>

    <div class="footer">
      <div class="footer-url" id="footer-url">—</div>
      <div class="count-badge none" id="count-badge">—</div>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
