<!doctype html>
<html>
  <head>
    <style>
      body {
        font-family: sans-serif;
        width: 300px;
        padding: 15px;
        margin: 0;
      }
      h3 {
        margin: 0 0 12px;
        font-size: 15px;
      }
      .row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
      }
      .btn-primary {
        width: 100%;
        padding: 8px;
        background: #0078d4;
        color: white;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        margin-bottom: 8px;
        font-size: 13px;
      }
      .btn-primary:hover {
        background: #005a9e;
      }
      .btn-sm {
        flex: 1;
        padding: 5px 4px;
        font-size: 11px;
        background: #2d2d2d;
        color: #ccc;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        margin: 0 2px;
      }
      .btn-sm:hover {
        background: #444;
      }
      .export-row {
        display: flex;
        gap: 4px;
        margin-bottom: 10px;
      }
      .history-title {
        font-size: 11px;
        color: #888;
        margin-bottom: 6px;
      }
      .history-item {
        font-size: 11px;
        padding: 5px 7px;
        background: #1e1e1e;
        color: #ccc;
        border-radius: 4px;
        margin-bottom: 4px;
        display: flex;
        justify-content: space-between;
      }
      #noHistory {
        font-size: 11px;
        color: #666;
      }
    </style>
  </head>
  <body>
    <h3>HydraLens</h3>
    <div class="row">
      <label style="font-size: 13px">Auto-scan on navigation</label>
      <input type="checkbox" id="autoScanToggle" checked />
    </div>
    <button class="btn-primary" id="scanNowBtn">Scan Current Page</button>
    <div class="export-row">
      <button class="btn-sm" id="exportJson">Export JSON</button>
      <button class="btn-sm" id="exportMd">Export Markdown</button>
      <button class="btn-sm" id="exportJira">Export Jira</button>
    </div>
    <div class="history-title">Recent scans</div>
    <div id="historyList"><div id="noHistory">No scans yet.</div></div>
    <script type="module" src="popup.js"></script>
  </body>
</html>
